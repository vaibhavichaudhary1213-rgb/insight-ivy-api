# render.yaml
services:
  - type: web
    name: insight-ivy-api
    runtime: python
    repo: https://github.com/vaibhavichaudhary1213-rgb/insight-ivy-api.git
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: insight-ivy-db
          property: connectionString
      - key: ADMIN_PASSWORD
        value: admin123
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: insight-ivy-db
    plan: free
    region: oregon
    databaseName: ivyinsight
    user: ivyuser
